name: StructureRelations
channels:
  - conda-forge
dependencies:
  - python=3.11.14
  - matplotlib=3.10.7
  - networkx=3.6.1
  - ipympl==0.9.7
  - jupyterlab=4.5.0
  - numpy=2.3.5
  - pandas=2.3.3
  - pydicom=3.0.1
  - pygraphviz=1.14
  - pylint=4.0.3
  - pyodbc=5.3.0
  - pytest=8.4.2
  - scipy=1.16.3
  - shapely=2.1.2
  - fastapi=0.121.1
  - uvicorn=0.35.0
  - python-multipart=0.0.20
  - websockets=15.0.1
  - pydantic=2.12.4

variables:
  PYTHONPATH: /workspaces/StructureRelations:/workspaces/StructureRelations/src:/workspaces/StructureRelations/Tests:/workspaces/StructureRelations/examples:$PYTHONPATH

prefix: /opt/conda/envs/StructureRelations
